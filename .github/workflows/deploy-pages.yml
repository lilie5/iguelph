name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Pages base path
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "PAGES_BASE_PATH=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/" >> "$GITHUB_ENV"
          fi

      - name: Resolve custom domain
        run: |
          if [ -n "${{ vars.PAGES_CUSTOM_DOMAIN }}" ]; then
            echo "PAGES_CUSTOM_DOMAIN=${{ vars.PAGES_CUSTOM_DOMAIN }}" >> "$GITHUB_ENV"
          else
            echo "PAGES_CUSTOM_DOMAIN=igemguelph.org" >> "$GITHUB_ENV"
          fi

      - name: Build static site
        run: npx ng build --configuration=production --base-href="$PAGES_BASE_PATH" --deploy-url="$PAGES_BASE_PATH"

      - name: Prepare Pages artifact
        run: |
          test -d dist/igem_guelph_website/browser
          echo "$PAGES_CUSTOM_DOMAIN" > dist/igem_guelph_website/browser/CNAME
          touch dist/igem_guelph_website/browser/.nojekyll
          cp dist/igem_guelph_website/browser/index.html dist/igem_guelph_website/browser/404.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/igem_guelph_website/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
