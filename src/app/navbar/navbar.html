<nav class="navbar">
  <a class="navbar-logo" routerLink="/" aria-label="Home">
    <img src="/assets/shortenedlogo.png" alt="Home" />
  </a>

  <div class="navbar-links">
    @for (item of navItems; track item.link) {
      <a mat-button [routerLink]="item.link">
        @if (item.icon) {
          <mat-icon aria-hidden="true" class="navbar-link-icon">{{ item.icon }}</mat-icon>
        }
        <span>{{ item.text }}</span>
      </a>
    }
  </div>
</nav>
