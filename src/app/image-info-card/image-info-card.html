<div class="image-info-card-wrapper" [class.align-right]="alignRight()">
  <mat-card class="info-card hover-accent-card">
    <mat-card-header class="card-header">
      <mat-card-title class="card-title">
        {{ title() }}
        @if (goldStar()) {
          <span class="gold-star-badge">
            <mat-icon class="star-icon">star</mat-icon>
            <span class="won-gold-text">WON GOLD</span>
          </span>
        }
      </mat-card-title>
      @if (date()) {
        <span class="card-date">{{ date() }}</span>
      }
    </mat-card-header>
    <mat-card-content>
      <p>{{ text() }}</p>
      @if (href()) {
        <app-button-with-arrow [href]="href()" text="View Project" />
      }
    </mat-card-content>
  </mat-card>

  <div class="image-container">
    @if (href()) {
      <a [href]="href()" target="_blank" rel="noopener noreferrer" class="image-link">
        <img class="side-image" [src]="imagePath()" [alt]="title()" />
      </a>
    } @else {
      <img class="side-image" [src]="imagePath()" [alt]="title()" />
    }
  </div>
</div>
